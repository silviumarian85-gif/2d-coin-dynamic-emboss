<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2D Coin - Outer Gyro Engine</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; display: flex; justify-content: center; align-items: center; font-family: sans-serif; }
        svg { width: 100% !important; height: 100% !important; object-fit: contain; display: block; }

        /* Status Giroscop */
        #status-indicator {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 8px 16px; background: rgba(0,0,0,0.8); border-radius: 20px;
            color: #ff4444; font-size: 12px; border: 1px solid #444; z-index: 3000;
            pointer-events: none; transition: all 0.3s; white-space: nowrap;
        }
        #status-indicator.active { color: #00ffcc; border-color: #00ffcc; }

        /* Buton Activare */
        #gyro-btn {
            position: absolute; bottom: 40px; padding: 16px 32px;
            background: #fff; color: #000; border: none;
            border-radius: 50px; cursor: pointer; z-index: 2000; 
            font-weight: bold; font-size: 16px; box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="status-indicator">Senzori: Așteptare activare...</div>
    <button id="gyro-btn">ACTIVEAZĂ EFECTELE DINAMICE</button>

    <div class="viewport">
        <svg id="coin-svg" viewBox="0 0 1080 2280" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- FILTRU LUMINĂ (Outer Bevel) -->
                <filter id="f-light" x="-30%" y="-30%" width="160%" height="160%">
                    <feColorMatrix type="luminanceToAlpha" result="mask" />
                    <!-- cleanMask pentru tăiere -->
                    <feComponentTransfer in="mask" result="cleanMask">
                        <feFuncA type="linear" slope="10" intercept="-0.5" />
                    </feComponentTransfer>
                    
                    <feGaussianBlur in="mask" stdDeviation="2.5" result="blur" />
                    <feSpecularLighting in="blur" id="spec-node" surfaceScale="5.5" specularConstant="1" specularExponent="20" lighting-color="#ffffff">
                        <feDistantLight id="h-dir" azimuth="214" elevation="10" />
                    </feSpecularLighting>
                    
                    <!-- OPERATOR OUT: Lumina apare doar în EXTERIORUL formei -->
                    <feComposite in2="cleanMask" operator="out" />
                </filter>

                <!-- FILTRU UMBRĂ (Outer Bevel) -->
                <filter id="f-shadow" x="-30%" y="-30%" width="160%" height="160%">
                    <feColorMatrix type="luminanceToAlpha" result="mask" />
                    <feComponentTransfer in="mask" result="cleanMask">
                        <feFuncA type="linear" slope="10" intercept="-0.5" />
                    </feComponentTransfer>

                    <feGaussianBlur in="mask" stdDeviation="2.5" result="blur" />
                    <feDiffuseLighting in="blur" id="diff-node" surfaceScale="5.5" diffuseConstant="1" lighting-color="#000000">
                        <feDistantLight id="s-dir" azimuth="214" elevation="10" />
                    </feDiffuseLighting>
                    
                    <!-- OPERATOR OUT: Umbra apare doar în EXTERIORUL formei -->
                    <feComposite in2="cleanMask" operator="out" />
                </filter>
            </defs>

            <!-- 1. Baza: Moneda Color -->
            <image href="diffuse.png" x="0" y="0" width="1080" height="2280" preserveAspectRatio="none" />

            <!-- 2. Umbra: 9% Opacity (Outer) -->
            <image id="shadow-layer" href="height-map-coin.png" x="0" y="0" width="1080" height="2280" 
                   preserveAspectRatio="none" filter="url(#f-shadow)" style="mix-blend-mode: multiply; opacity: 0.09;" />

            <!-- 3. Lumina: 75% Opacity (Outer) -->
            <image id="light-layer" href="height-map-coin.png" x="0" y="0" width="1080" height="2280" 
                   preserveAspectRatio="none" filter="url(#f-light)" style="mix-blend-mode: plus-lighter; opacity: 0.75;" />
        </svg>
    </div>

    <script type="module">
        const hDir = document.getElementById('h-dir');
        const sDir = document.getElementById('s-dir');
        const gyroBtn = document.getElementById('gyro-btn');
        const statusInd = document.getElementById('status-indicator');

        function handleOrientation(event) {
            // Beta: front/back tilt (-90 to 90 când stă în palmă)
            // Gamma: left/right tilt (-90 to 90)
            let beta = event.beta || 0; 
            let gamma = event.gamma || 0;

            if (beta !== 0 || gamma !== 0) {
                statusInd.innerText = `Senzori: OK (Beta: ${Math.round(beta)}°, Gamma: ${Math.round(gamma)}°)`;
                statusInd.classList.add('active');
            }

            // --- CALCUL UNGHI (Azimuth) ---
            // Inversăm axele pentru a corela mișcarea mâinii cu reflexia
            // Când înclinăm spre dreapta (gamma +), lumina trebuie să se miște spre dreapta.
            let angleRad = Math.atan2(beta, gamma);
            let angleDeg = angleRad * (180 / Math.PI);
            
            // Mapare unghi circular 0-360
            let finalAngle = (angleDeg + 360) % 360;

            // --- CALCUL ALTITUDINE (Elevation) ---
            // Calculăm cât de mult e înclinat telefonul față de poziția "flat"
            let tiltIntensity = Math.sqrt(beta * beta + gamma * gamma);
            // 90 grade = lumină fix de sus (telefon plat)
            // 10 grade = lumină razantă (telefon foarte înclinat)
            let finalAlt = Math.max(5, Math.min(60, 90 - tiltIntensity));

            // Aplicăm noile valori distanțierelor de lumină
            hDir.setAttribute('azimuth', finalAngle);
            hDir.setAttribute('elevation', finalAlt);
            sDir.setAttribute('azimuth', finalAngle);
            sDir.setAttribute('elevation', finalAlt);
        }

        async function requestPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        startEngine();
                    } else {
                        statusInd.innerText = "Acces Senzori: Respins";
                    }
                } catch (e) {
                    statusInd.innerText = "Eroare: Necesită HTTPS";
                }
            } else {
                startEngine();
            }
        }

        function startEngine() {
            window.addEventListener('deviceorientation', handleOrientation);
            gyroBtn.style.display = 'none';
            statusInd.innerText = "Senzori: Activi - Mișcă telefonul";
        }

        gyroBtn.addEventListener('click', requestPermission);
    </script>
</body>
</html>
