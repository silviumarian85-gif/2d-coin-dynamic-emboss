<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2D Coin - Vector Direction Engine</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; display: flex; justify-content: center; align-items: center; font-family: 'Courier New', Courier, monospace; }
        svg { width: 100% !important; height: 100% !important; object-fit: contain; display: block; z-index: 1; }

        /* Monitorizare Setări (Deasupra monedei) */
        #bevel-monitor {
            position: absolute; top: 10%; width: 200px;
            background: rgba(0,0,0,0.7); border: 1px solid #444; border-radius: 8px;
            padding: 10px; color: #00ffcc; font-size: 10px; z-index: 100; pointer-events: none;
        }
        .val { color: #fff; float: right; }

        /* Buton Activare */
        #gyro-btn {
            position: absolute; bottom: 40px; padding: 16px 32px;
            background: #fff; color: #000; border: none;
            border-radius: 50px; cursor: pointer; z-index: 2000; 
            font-weight: bold; font-size: 14px; box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="bevel-monitor">
        <div style="text-align:center; border-bottom:1px solid #444; margin-bottom:5px; padding-bottom:5px; color:#ffff00">LIVE BEVEL SETTINGS</div>
        <div>Style: <span class="val">Outer</span></div>
        <div>Direction: <span class="val" id="m-dir">0°</span></div>
        <div>Altitude: <span class="val" id="m-alt">0°</span></div>
        <div>Depth: <span class="val">22%</span></div>
        <div style="margin-top:5px; color:#666">Gyro Beta: <span id="m-beta" class="val">0</span></div>
        <div style="color:#666">Gyro Gamma: <span id="m-gamma" class="val">0</span></div>
    </div>

    <button id="gyro-btn">ACTIVEAZĂ DIRECȚIA DINAMICĂ</button>

    <div class="viewport">
        <svg id="coin-svg" viewBox="0 0 1080 2280" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- FILTRU LUMINĂ (Outer) -->
                <filter id="f-light" x="-30%" y="-30%" width="160%" height="160%">
                    <feColorMatrix type="luminanceToAlpha" result="mask" />
                    <feComponentTransfer in="mask" result="cleanMask">
                        <feFuncA type="linear" slope="10" intercept="-0.5" />
                    </feComponentTransfer>
                    <feGaussianBlur in="mask" stdDeviation="2.5" result="blur" />
                    <feSpecularLighting in="blur" id="spec-node" surfaceScale="5.5" specularConstant="1" specularExponent="20" lighting-color="#ffffff">
                        <feDistantLight id="h-light-dir" azimuth="0" elevation="10" />
                    </feSpecularLighting>
                    <feComposite in2="cleanMask" operator="out" />
                </filter>

                <!-- FILTRU UMBRĂ (Outer) -->
                <filter id="f-shadow" x="-30%" y="-30%" width="160%" height="160%">
                    <feColorMatrix type="luminanceToAlpha" result="mask" />
                    <feComponentTransfer in="mask" result="cleanMask">
                        <feFuncA type="linear" slope="10" intercept="-0.5" />
                    </feComponentTransfer>
                    <feGaussianBlur in="mask" stdDeviation="2.5" result="blur" />
                    <feDiffuseLighting in="blur" id="diff-node" surfaceScale="5.5" diffuseConstant="1" lighting-color="#000000">
                        <feDistantLight id="s-light-dir" azimuth="0" elevation="10" />
                    </feDiffuseLighting>
                    <feComposite in2="cleanMask" operator="out" />
                </filter>
            </defs>

            <image href="diffuse.png" x="0" y="0" width="1080" height="2280" preserveAspectRatio="none" />

            <image id="shadow-layer" href="height-map-coin.png" x="0" y="0" width="1080" height="2280" 
                   preserveAspectRatio="none" filter="url(#f-shadow)" style="mix-blend-mode: multiply; opacity: 0.09;" />

            <image id="light-layer" href="height-map-coin.png" x="0" y="0" width="1080" height="2280" 
                   preserveAspectRatio="none" filter="url(#f-light)" style="mix-blend-mode: plus-lighter; opacity: 0.75;" />
        </svg>
    </div>

    <script type="module">
        const hLight = document.getElementById('h-light-dir');
        const sLight = document.getElementById('s-light-dir');
        const gyroBtn = document.getElementById('gyro-btn');
        
        // Elemente Monitor
        const mDir = document.getElementById('m-dir');
        const mAlt = document.getElementById('m-alt');
        const mBeta = document.getElementById('m-beta');
        const mGamma = document.getElementById('m-gamma');

        function handleOrientation(event) {
            // Beta: înclinare sus-jos (-90 la 90)
            // Gamma: înclinare stânga-dreapta (-90 la 90)
            let beta = event.beta || 0; 
            let gamma = event.gamma || 0;

            // --- LOGICA VECTORIALĂ (DIRECȚIE DIRECTĂ) ---
            // Folosim gamma pentru X și beta pentru Y pentru a determina direcția înclinației
            // Inversăm gamma (stânga/dreapta) pentru ca lumina să urmeze mâna natural
            let angleRad = Math.atan2(beta, -gamma); 
            let angleDeg = angleRad * (180 / Math.PI);
            
            // Mapare unghi 0-360 (Azimuth)
            let finalAngle = (angleDeg + 360) % 360;

            // --- ALTITUDINE DINAMICĂ ---
            // Distanța vectorului de la centru determină cât de razantă e lumina
            let tiltMagnitude = Math.sqrt(beta * beta + gamma * gamma);
            let finalAlt = Math.max(5, Math.min(80, 90 - tiltMagnitude));

            // Actualizare Filtre SVG
            hLight.setAttribute('azimuth', finalAngle);
            hLight.setAttribute('elevation', finalAlt);
            sLight.setAttribute('azimuth', finalAngle);
            sLight.setAttribute('elevation', finalAlt);

            // Actualizare Monitor
            mDir.innerText = Math.round(finalAngle) + "°";
            mAlt.innerText = Math.round(finalAlt) + "°";
            mBeta.innerText = Math.round(beta);
            mGamma.innerText = Math.round(gamma);
        }

        async function requestPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        startEngine();
                    }
                } catch (e) {
                    alert("Necesită HTTPS pentru senzori.");
                }
            } else {
                startEngine();
            }
        }

        function startEngine() {
            window.addEventListener('deviceorientation', handleOrientation);
            gyroBtn.style.display = 'none';
        }

        gyroBtn.addEventListener('click', requestPermission);
    </script>
</body>
</html>
