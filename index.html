<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2D Coin - Giroscop Activ</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; display: flex; justify-content: center; align-items: center; font-family: sans-serif; }
        svg { width: 100% !important; height: 100% !important; object-fit: contain; display: block; }

        /* Mesaj Status Giroscop */
        #status-indicator {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 8px 16px; background: rgba(0,0,0,0.7); border-radius: 20px;
            color: #ff4444; font-size: 12px; border: 1px solid #444; z-index: 3000;
            pointer-events: none; transition: all 0.3s;
        }
        #status-indicator.active { color: #00ffcc; border-color: #00ffcc; }

        /* Buton Activare (Necesar pentru permisiuni iOS/Chrome) */
        #gyro-btn {
            position: absolute; bottom: 40px; padding: 16px 32px;
            background: #fff; color: #000; border: none;
            border-radius: 50px; cursor: pointer; z-index: 2000; 
            font-weight: bold; font-size: 16px; box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="status-indicator">Senzori: Inactivi</div>
    <button id="gyro-btn">ACTIVEAZĂ GIROSCOPUL</button>

    <div class="viewport">
        <svg id="coin-svg" viewBox="0 0 1080 2280" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- FILTRU LUMINĂ (Highlight) - Depth 22% (surfaceScale 5.5) - Size 10px (stdDev 2.5) -->
                <filter id="f-light" x="-20%" y="-20%" width="140%" height="140%">
                    <feColorMatrix type="luminanceToAlpha" result="mask" />
                    <feComponentTransfer in="mask" result="cleanMask">
                        <feFuncA type="linear" slope="2" intercept="-0.1" />
                    </feComponentTransfer>
                    <feGaussianBlur in="cleanMask" stdDeviation="2.5" result="blur" />
                    <feSpecularLighting in="blur" id="spec-node" surfaceScale="5.5" specularConstant="1" specularExponent="20" lighting-color="#ffffff">
                        <feDistantLight id="h-dir" azimuth="214" elevation="10" />
                    </feSpecularLighting>
                    <feComposite in2="cleanMask" operator="in" />
                </filter>

                <!-- FILTRU UMBRĂ (Shadow) -->
                <filter id="f-shadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feColorMatrix type="luminanceToAlpha" result="mask" />
                    <feComponentTransfer in="mask" result="cleanMask">
                        <feFuncA type="linear" slope="2" intercept="-0.1" />
                    </feComponentTransfer>
                    <feGaussianBlur in="cleanMask" stdDeviation="2.5" result="blur" />
                    <feDiffuseLighting in="blur" id="diff-node" surfaceScale="5.5" diffuseConstant="1" lighting-color="#000000">
                        <feDistantLight id="s-dir" azimuth="214" elevation="10" />
                    </feDiffuseLighting>
                    <feComposite in2="cleanMask" operator="in" />
                </filter>
            </defs>

            <!-- 1. Baza: Imaginea Diffuse -->
            <image href="diffuse.png" x="0" y="0" width="1080" height="2280" preserveAspectRatio="none" />

            <!-- 2. Umbra: 9% Opacity ( Multiply) -->
            <image id="shadow-layer" href="height-map-coin.png" x="0" y="0" width="1080" height="2280" 
                   preserveAspectRatio="none" filter="url(#f-shadow)" style="mix-blend-mode: multiply; opacity: 0.09;" />

            <!-- 3. Lumina: 75% Opacity (Add) -->
            <image id="light-layer" href="height-map-coin.png" x="0" y="0" width="1080" height="2280" 
                   preserveAspectRatio="none" filter="url(#f-light)" style="mix-blend-mode: plus-lighter; opacity: 0.75;" />
        </svg>
    </div>

    <script type="module">
        const hDir = document.getElementById('h-dir');
        const sDir = document.getElementById('s-dir');
        const gyroBtn = document.getElementById('gyro-btn');
        const statusInd = document.getElementById('status-indicator');

        function handleOrientation(event) {
            // Beta: front/back tilt (înclinare spre tine / de la tine)
            // Gamma: left/right tilt (înclinare stânga / dreapta)
            let beta = event.beta || 0; 
            let gamma = event.gamma || 0;

            // Confirmăm că primim date (Status activ)
            if (beta !== 0 || gamma !== 0) {
                statusInd.innerText = "Senzori: Activi (" + Math.round(beta) + "°, " + Math.round(gamma) + "°)";
                statusInd.classList.add('active');
            }

            // --- CALCUL ANGLE (Azimuth) ---
            // Folosim atan2 pentru a obține unghiul în funcție de vectorul de înclinație
            // x = gamma, y = beta
            let angleRad = Math.atan2(beta, gamma);
            let angleDeg = angleRad * (180 / Math.PI);
            
            // Corecție pentru coordonatele SVG (0° este la ora 3)
            let finalAngle = (angleDeg + 360) % 360;

            // --- CALCUL ALTITUDE (Elevation) ---
            // Cu cât telefonul este mai înclinat față de orizontală, cu atât altitudinea scade
            let tiltIntensity = Math.sqrt(beta * beta + gamma * gamma);
            let finalAlt = Math.max(5, Math.min(60, 90 - tiltIntensity));

            // Aplicăm valorile pe ambele filtre
            hDir.setAttribute('azimuth', finalAngle);
            hDir.setAttribute('elevation', finalAlt);
            sDir.setAttribute('azimuth', finalAngle);
            sDir.setAttribute('elevation', finalAlt);
        }

        async function requestPermission() {
            // Logica obligatorie pentru iPhone/iOS 13+
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        startGyro();
                    } else {
                        statusInd.innerText = "Permisiune Refuzată";
                    }
                } catch (error) {
                    statusInd.innerText = "Eroare Senzori";
                    console.error(error);
                }
            } else {
                // Pentru Android sau browsere fără sistem de permisiune explicită
                startGyro();
            }
        }

        function startGyro() {
            window.addEventListener('deviceorientation', handleOrientation);
            gyroBtn.style.display = 'none';
            statusInd.innerText = "Senzori: Așteptare date...";
        }

        gyroBtn.addEventListener('click', requestPermission);
    </script>
</body>
</html>
