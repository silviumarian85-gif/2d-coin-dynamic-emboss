<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2D Coin Pro Configurator - Final</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0a0a0a; display: flex; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* Panou Control - Stânga */
        #ui-panel {
            width: 290px; background: rgba(206, 206, 206, 0.95); border-right: 2px solid #555; padding: 15px; color: #000; z-index: 1000; font-size: 11px; overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.5); height: 100vh;
        }
        h3 { margin: 0 0 10px 0; background: #444; color: white; padding: 5px; border: 1px inset #eee; font-size: 12px; text-align: center; text-transform: uppercase; }
        .group { border: 1px solid #999; padding: 8px; margin-bottom: 10px; background: #e1e1e1; border-radius: 3px; }
        .group-title { display: block; margin-bottom: 8px; font-weight: bold; border-bottom: 1px solid #ccc; text-transform: uppercase; font-size: 10px; color: #333; }
        .row { display: flex; justify-content: space-between; margin-bottom: 6px; align-items: center; gap: 5px; }
        label { width: 100px; font-weight: bold; }
        input[type=range] { flex-grow: 1; cursor: pointer; accent-color: #0055ff; }
        span { width: 45px; text-align: right; font-family: monospace; font-size: 10px; color: #0055ff; }
        
        .btn-box { display: flex; gap: 5px; margin-bottom: 5px; }
        .btn { flex: 1; padding: 6px; text-align: center; border: 1px solid #999; cursor: pointer; background: #eee; font-size: 10px; font-weight: bold; border-radius: 3px; }
        .btn.active { background: #4a90e2; color: white; border-color: #2a60a0; }
        .btn-gyro { background: #ffcc00; margin-top: 5px; border: 1px solid #996600; }
        .btn-gyro.active { background: #00ffcc; border-color: #009977; }

        /* Viewport */
        .viewport { flex-grow: 1; display: flex; justify-content: center; align-items: center; background: #222; height: 100vh; position: relative; cursor: crosshair; }
        #coin-svg { height: 95vh; aspect-ratio: 1080 / 2280; display: block; background: #000; box-shadow: 0 0 50px rgba(0,0,0,0.8); }

        #gyro-overlay { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 5000; display: none; justify-content: center; align-items: center; }
        #start-gyro-btn { padding: 20px 40px; font-size: 18px; font-weight: bold; border-radius: 50px; border: none; background: #00ffcc; cursor: pointer; }
    </style>
</head>
<body>

    <div id="gyro-overlay">
        <button id="start-gyro-btn">START SENSORS (MOBILE)</button>
    </div>

    <div id="ui-panel">
        <h3>Pro Configurator</h3>
        
        <!-- HDRI TUNING -->
        <div class="group">
            <span class="group-title">HDRI Reflection (Tile 5x5)</span>
            <div class="row">
                <label>Scale:</label>
                <input type="range" id="hdri-sc" min="10" max="300" value="100">
                <span id="v-hdri-sc">100%</span>
            </div>
            <div class="row">
                <label>Brightness:</label>
                <input type="range" id="hdri-br" min="0" max="300" value="100">
                <span id="v-hdri-br">100%</span>
            </div>
            <div class="row">
                <label>Contrast:</label>
                <input type="range" id="hdri-ct" min="0" max="300" value="100">
                <span id="v-hdri-ct">100%</span>
            </div>
            <div class="row">
                <label>Manual X:</label>
                <input type="range" id="hdri-x" min="-1000" max="1000" value="0">
                <span id="v-hdri-x">0</span>
            </div>
            <div class="row">
                <label>Manual Y:</label>
                <input type="range" id="hdri-y" min="-1000" max="1000" value="0">
                <span id="v-hdri-y">0</span>
            </div>
            <div class="row">
                <label>Rotation:</label>
                <input type="range" id="hdri-rot" min="0" max="360" value="0">
                <span id="v-hdri-rot">0°</span>
            </div>
        </div>

        <!-- BEVEL STRUCTURE -->
        <div class="group">
            <span class="group-title">Bevel Structure</span>
            <div class="btn-box">
                <div class="btn active" id="style-inner">Inner</div>
                <div class="btn" id="style-outer">Outer</div>
            </div>
            <div class="row">
                <label>Depth:</label>
                <input type="range" id="depth" min="0" max="200" value="22">
                <span id="v-depth">22%</span>
            </div>
            <div class="row">
                <label>Size (Blur):</label>
                <input type="range" id="size" min="0" max="100" value="10">
                <span id="v-size">10px</span>
            </div>
        </div>

        <!-- SHADING & INTERACTIVE -->
        <div class="group">
            <span class="group-title">Shading & Sensors</span>
            <div class="row">
                <label>Angle:</label>
                <input type="range" id="angle" min="0" max="360" value="214">
                <span id="v-angle">214°</span>
            </div>
            <div class="row">
                <label>Altitude:</label>
                <input type="range" id="altitude" min="0" max="90" value="10">
                <span id="v-altitude">10°</span>
            </div>
            <div class="btn btn-gyro" id="toggle-alt-gyro">Altitude Dynamic: OFF</div>
            <div class="btn btn-gyro" id="activate-sensors">Gyroscope: OFF</div>
        </div>

        <!-- OPACITIES -->
        <div class="group">
            <span class="group-title">Layers Opacity</span>
            <div class="row">
                <label>HDRI Layer:</label>
                <input type="range" id="hdri-op" min="0" max="100" value="50">
                <span id="v-hdri-op">50%</span>
            </div>
            <div class="row">
                <label>High (Add):</label>
                <input type="range" id="h-op" min="0" max="100" value="75">
                <span id="v-h-op">75%</span>
            </div>
            <div class="row">
                <label>Shadow (Mult):</label>
                <input type="range" id="s-op" min="0" max="100" value="9">
                <span id="v-s-op">9%</span>
            </div>
        </div>
    </div>

    <div class="viewport" id="interaction-area">
        <svg id="coin-svg" viewBox="0 0 1080 2280" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- MASCA FIXĂ MONEDĂ -->
                <clipPath id="coin-mask">
                    <circle cx="494" cy="1180" r="150.5" />
                </clipPath>

                <!-- FILTRU LUMINĂ -->
                <filter id="f-light" x="-20%" y="-20%" width="140%" height="140%">
                    <feColorMatrix type="luminanceToAlpha" result="m" />
                    <feGaussianBlur in="m" id="l-blur" stdDeviation="2.5" />
                    <feSpecularLighting id="spec-node" surfaceScale="5.5" specularExponent="20" lighting-color="white">
                        <feDistantLight id="h-dir" azimuth="214" elevation="10" />
                    </feSpecularLighting>
                    <feComposite in2="m" id="h-mask" operator="in" />
                </filter>

                <!-- FILTRU UMBRĂ -->
                <filter id="f-shadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feColorMatrix type="luminanceToAlpha" result="m" />
                    <feGaussianBlur in="m" id="s-blur" stdDeviation="2.5" />
                    <feDiffuseLighting id="diff-node" surfaceScale="5.5" diffuseConstant="1" lighting-color="black">
                        <feDistantLight id="s-dir" azimuth="214" elevation="10" />
                    </feDiffuseLighting>
                    <feComposite in2="m" id="s-mask" operator="in" />
                </filter>
            </defs>

            <!-- 1. Baza monedei -->
            <image href="diffuse.png" width="1080" height="2280" />

            <!-- 2. REFLEXIA HDRI 5x5 GRID -->
            <g clip-path="url(#coin-mask)">
                <g id="hdri-container"></g>
            </g>

            <!-- 3. Bevel Layers -->
            <image id="shadow-layer" href="height-map-coin.png" width="1080" height="2280" filter="url(#f-shadow)" style="mix-blend-mode: multiply; opacity: 0.09;" />
            <image id="light-layer" href="height-map-coin.png" width="1080" height="2280" filter="url(#f-light)" style="mix-blend-mode: plus-lighter; opacity: 0.75;" />
        </svg>
    </div>

    <script>
        let currentStyle = 'inner';
        let gyroActive = false;
        let altitudeDynamic = false;
        let currentInput = { x: 0, y: 0 }; // Beta / Gamma (simulated or real)

        const hdriContainer = document.getElementById('hdri-container');
        const hDir = document.getElementById('h-dir');
        const sDir = document.getElementById('s-dir');

        // GENERARE GRID x5 (25 IMAGINI)
        function createHdriGrid() {
            hdriContainer.innerHTML = '';
            for (let row = -2; row <= 2; row++) {
                for (let col = -2; col <= 2; col++) {
                    const img = document.createElementNS("http://www.w3.org/2000/svg", "image");
                    img.setAttributeNS("http://www.w3.org/1999/xlink", "href", "hdri.jpg");
                    img.setAttribute("class", "hdri-tile");
                    img.setAttribute("width", "1024");
                    img.setAttribute("height", "1024");
                    img.setAttribute("x", col * 1024);
                    img.setAttribute("y", row * 1024);
                    hdriContainer.appendChild(img);
                }
            }
        }
        createHdriGrid();

        function update() {
            const depth = document.getElementById('depth').value;
            const size = document.getElementById('size').value;
            const angle = document.getElementById('angle').value;
            const altitude = document.getElementById('altitude').value;
            
            const hOp = document.getElementById('h-op').value / 100;
            const sOp = document.getElementById('s-op').value / 100;
            const hdriOp = document.getElementById('hdri-op').value / 100;
            const hdriSc = document.getElementById('hdri-sc').value / 100;
            const hdriBr = document.getElementById('hdri-br').value;
            const hdriCt = document.getElementById('hdri-ct').value;
            const hdriRot = document.getElementById('hdri-rot').value;
            const hdriManualX = parseFloat(document.getElementById('hdri-x').value);
            const hdriManualY = parseFloat(document.getElementById('hdri-y').value);

            // Labels Update
            document.getElementById('v-depth').innerText = depth + "%";
            document.getElementById('v-size').innerText = size + "px";
            document.getElementById('v-angle').innerText = angle + "°";
            document.getElementById('v-altitude').innerText = altitude + "°";
            document.getElementById('v-hdri-sc').innerText = Math.round(hdriSc * 100) + "%";
            document.getElementById('v-hdri-op').innerText = Math.round(hdriOp * 100) + "%";
            document.getElementById('v-hdri-br').innerText = hdriBr + "%";
            document.getElementById('v-hdri-ct').innerText = hdriCt + "%";
            document.getElementById('v-hdri-x').innerText = Math.round(hdriManualX);
            document.getElementById('v-hdri-y').innerText = Math.round(hdriManualY);
            document.getElementById('v-hdri-rot').innerText = hdriRot + "°";
            document.getElementById('v-h-op').innerText = Math.round(hOp * 100) + "%";
            document.getElementById('v-s-op').innerText = Math.round(sOp * 100) + "%";

            // BEVEL SVG UPDATE
            const surfaceScale = (depth / 100) * 25;
            document.getElementById('spec-node').setAttribute('surfaceScale', surfaceScale);
            document.getElementById('diff-node').setAttribute('surfaceScale', surfaceScale);
            document.getElementById('l-blur').setAttribute('stdDeviation', size / 4);
            document.getElementById('s-blur').setAttribute('stdDeviation', size / 4);
            
            hDir.setAttribute('azimuth', angle);
            hDir.setAttribute('elevation', altitude);
            sDir.setAttribute('azimuth', angle);
            sDir.setAttribute('elevation', altitude);

            document.getElementById('light-layer').style.opacity = hOp;
            document.getElementById('shadow-layer').style.opacity = sOp;

            // HDRI GRID UPDATE
            const baseSize = 1024 * hdriSc;
            const tiles = document.querySelectorAll('.hdri-tile');
            tiles.forEach((tile, i) => {
                tile.setAttribute('width', baseSize);
                tile.setAttribute('height', baseSize);
                const col = (i % 5) - 2;
                const row = Math.floor(i / 5) - 2;
                tile.setAttribute('x', col * baseSize);
                tile.setAttribute('y', row * baseSize);
            });

            // HDRI Movement (Sensitivity -15)
            let moveX = currentInput.x * -15; 
            let moveY = currentInput.y * -15;
            let finalX = 494 - (baseSize / 2) + moveX + hdriManualX;
            let finalY = 1180 - (baseSize / 2) + moveY + hdriManualY;

            hdriContainer.setAttribute('transform', `translate(${finalX}, ${finalY}) rotate(${hdriRot}, ${baseSize/2}, ${baseSize/2})`);
            hdriContainer.style.opacity = hdriOp;
            hdriContainer.style.filter = `brightness(${hdriBr}%) contrast(${hdriCt}%)`;

            // Inner/Outer Mask
            const op = (currentStyle === 'inner') ? 'in' : 'out';
            document.getElementById('h-mask').setAttribute('operator', op);
            document.getElementById('s-mask').setAttribute('operator', op);
        }

        // DESKTOP: MOUSE CONTROL
        window.addEventListener('mousemove', (e) => {
            if (gyroActive) return;
            // Mapăm poziția mouse-ului (-45 la 45 grade simulate)
            let gx = (e.clientX / window.innerWidth - 0.5) * 90;
            let gy = (e.clientY / window.innerHeight - 0.5) * 90;
            processInput(gy, gx);
        });

        // MOBILE: GYRO CONTROL
        function handleOrientation(event) {
            if (!gyroActive) return;
            processInput(event.beta, event.gamma);
        }

        function processInput(beta, gamma) {
            currentInput.x = gamma || 0;
            currentInput.y = beta || 0;

            // Update unghi Bevel (Direcție Directă)
            let angleRad = Math.atan2(currentInput.y, -currentInput.x);
            let angleDeg = (angleRad * (180 / Math.PI) + 360) % 360;
            document.getElementById('angle').value = Math.round(angleDeg);

            if (altitudeDynamic) {
                let tilt = Math.sqrt(currentInput.x**2 + currentInput.y**2);
                document.getElementById('altitude').value = Math.round(Math.max(5, Math.min(85, 90 - tilt)));
            }
            update();
        }

        // UI Listeners
        document.querySelectorAll('input').forEach(el => el.addEventListener('input', update));
        document.getElementById('style-inner').onclick = (e) => { currentStyle = 'inner'; e.target.classList.add('active'); document.getElementById('style-outer').classList.remove('active'); update(); };
        document.getElementById('style-outer').onclick = (e) => { currentStyle = 'outer'; e.target.classList.add('active'); document.getElementById('style-inner').classList.remove('active'); update(); };
        document.getElementById('toggle-alt-gyro').onclick = (e) => { 
            altitudeDynamic = !altitudeDynamic; 
            e.target.innerText = "Altitude Dynamic: " + (altitudeDynamic ? "ON" : "OFF");
            e.target.classList.toggle('active');
        };
        
        document.getElementById('activate-sensors').onclick = () => document.getElementById('gyro-overlay').style.display = 'flex';
        document.getElementById('start-gyro-btn').onclick = async () => {
            if (typeof DeviceOrientationEvent?.requestPermission === 'function') {
                const res = await DeviceOrientationEvent.requestPermission();
                if (res === 'granted') {
                    window.addEventListener('deviceorientation', handleOrientation);
                    gyroActive = true;
                }
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                gyroActive = true;
            }
            document.getElementById('gyro-overlay').style.display = 'none';
            document.getElementById('activate-sensors').innerText = "Gyroscope: ON";
            document.getElementById('activate-sensors').classList.add('active');
        };

        window.onload = update;
    </script>
</body>
</html>
