<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2D Coin - Desktop & Mobile Pro Engine</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a1a1a; display: flex; font-family: 'Segoe UI', sans-serif; }
        #ui-panel { width: 290px; background: #cecece; border-right: 2px solid #555; padding: 15px; color: #000; z-index: 1000; font-size: 11px; overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.5); }
        h3 { margin: 0 0 10px 0; background: #666; color: white; padding: 5px; border: 1px inset #eee; font-size: 12px; text-align: center; }
        .group { border: 1px solid #999; padding: 8px; margin-bottom: 10px; background: #e1e1e1; border-radius: 3px; }
        .group-title { display: block; margin-bottom: 8px; font-weight: bold; border-bottom: 1px solid #ccc; text-transform: uppercase; font-size: 10px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 6px; align-items: center; gap: 5px; }
        label { width: 95px; font-weight: bold; }
        input[type=range] { flex-grow: 1; cursor: pointer; }
        span { width: 45px; text-align: right; font-family: monospace; font-size: 10px; color: #0055ff; }
        .btn { flex: 1; padding: 6px; text-align: center; border: 1px solid #999; cursor: pointer; background: #eee; font-size: 10px; font-weight: bold; border-radius: 3px; }
        .btn.active { background: #4a90e2; color: white; }
        .viewport { flex-grow: 1; display: flex; justify-content: center; align-items: center; background: #000; height: 100vh; position: relative; cursor: crosshair; }
        #coin-svg { height: 95vh; aspect-ratio: 1080 / 2280; display: block; }
        #gyro-overlay { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; display: none; justify-content: center; align-items: center; }
        #start-gyro-btn { padding: 20px 40px; font-size: 18px; font-weight: bold; border-radius: 50px; border: none; background: #00ffcc; cursor: pointer; }
    </style>
</head>
<body>

    <div id="gyro-overlay">
        <button id="start-gyro-btn">START SENSORS / INTERACTION</button>
    </div>

    <div id="ui-panel">
        <h3>Pro Configurator</h3>
        
        <div class="group">
            <span class="group-title">HDRI Refl. (Tile 5x5)</span>
            <div class="row">
                <label>Scale:</label>
                <input type="range" id="hdri-sc" min="10" max="300" value="100">
                <span id="v-hdri-sc">100%</span>
            </div>
            <div class="row">
                <label>Intensity:</label>
                <input type="range" id="hdri-op" min="0" max="100" value="50">
                <span id="v-hdri-op">50%</span>
            </div>
            <div class="row">
                <label>Manual X:</label>
                <input type="range" id="hdri-x" min="-1000" max="1000" value="0">
                <span id="v-hdri-x">0</span>
            </div>
            <div class="row">
                <label>Manual Y:</label>
                <input type="range" id="hdri-y" min="-1000" max="1000" value="0">
                <span id="v-hdri-y">0</span>
            </div>
        </div>

        <div class="group">
            <span class="group-title">Bevel Structure</span>
            <div style="display:flex; gap:5px; margin-bottom:8px;">
                <div class="btn active" id="style-inner">Inner</div>
                <div class="btn" id="style-outer">Outer</div>
            </div>
            <div class="row"><label>Depth:</label><input type="range" id="depth" min="0" max="200" value="22"><span id="v-depth">22%</span></div>
            <div class="row"><label>Size:</label><input type="range" id="size" min="0" max="100" value="10"><span id="v-size">10px</span></div>
        </div>

        <div class="group">
            <strong>Interactive Control</strong>
            <div class="btn" id="toggle-alt-gyro" style="background:#ffcc00; margin-top:5px">Altitude Dynamic: OFF</div>
            <div class="btn" id="activate-sensors" style="background:#00ffcc">Activate Sensors</div>
            <div class="row"><label>Angle:</label><input type="range" id="angle" min="0" max="360" value="214"><span id="v-angle">214°</span></div>
            <div class="row"><label>Altitude:</label><input type="range" id="altitude" min="0" max="90" value="10"><span id="v-altitude">10°</span></div>
        </div>
    </div>

    <div class="viewport" id="mouse-area">
        <svg id="coin-svg" viewBox="0 0 1080 2280">
            <defs>
                <!-- MASCA MONEDA -->
                <clipPath id="coin-mask">
                    <circle cx="494" cy="1180" r="150.5" />
                </clipPath>

                <filter id="f-light">
                    <feColorMatrix type="luminanceToAlpha" result="m" />
                    <feGaussianBlur in="m" id="l-blur" stdDeviation="2.5" />
                    <feSpecularLighting surfaceScale="5.5" specularExponent="20" lighting-color="white">
                        <feDistantLight id="h-dir" azimuth="214" elevation="10" />
                    </feSpecularLighting>
                    <feComposite in2="m" operator="in" />
                </filter>

                <filter id="f-shadow">
                    <feColorMatrix type="luminanceToAlpha" result="m" />
                    <feGaussianBlur in="m" id="s-blur" stdDeviation="2.5" />
                    <feDiffuseLighting surfaceScale="5.5" lighting-color="black">
                        <feDistantLight id="s-dir" azimuth="214" elevation="10" />
                    </feDiffuseLighting>
                    <feComposite in2="m" operator="in" />
                </filter>
            </defs>

            <!-- 1. Baza -->
            <image href="diffuse.png" width="1080" height="2280" />

            <!-- 2. REFLEXIA HDRI 5x5 TILING -->
            <g clip-path="url(#coin-mask)">
                <g id="hdri-container"></g>
            </g>

            <!-- 3. Bevel Layers -->
            <image id="shadow-layer" href="height-map-coin.png" width="1080" height="2280" filter="url(#f-shadow)" style="mix-blend-mode: multiply; opacity: 0.09;" />
            <image id="light-layer" href="height-map-coin.png" width="1080" height="2280" filter="url(#f-light)" style="mix-blend-mode: plus-lighter; opacity: 0.75;" />
        </svg>
    </div>

    <script>
        let currentStyle = 'inner';
        let gyroActive = false;
        let altitudeDynamic = false;
        let currentInput = { x: 0, y: 0 }; // Beta / Gamma simulate

        const hdriContainer = document.getElementById('hdri-container');
        const hDir = document.getElementById('h-dir');
        const sDir = document.getElementById('s-dir');

        // GENERARE TILE x5 (25 imagini)
        function createHdriGrid() {
            hdriContainer.innerHTML = '';
            for (let row = -2; row <= 2; row++) {
                for (let col = -2; col <= 2; col++) {
                    const img = document.createElementNS("http://www.w3.org/2000/svg", "image");
                    img.setAttributeNS("http://www.w3.org/1999/xlink", "href", "hdri.jpg");
                    img.setAttribute("class", "hdri-tile");
                    img.setAttribute("width", "1024");
                    img.setAttribute("height", "1024");
                    img.setAttribute("x", col * 1024);
                    img.setAttribute("y", row * 1024);
                    hdriContainer.appendChild(img);
                }
            }
        }
        createHdriGrid();

        function update() {
            const depth = document.getElementById('depth').value;
            const size = document.getElementById('size').value;
            const angle = document.getElementById('angle').value;
            const altitude = document.getElementById('altitude').value;
            const hdriOp = document.getElementById('hdri-op').value / 100;
            const hdriSc = document.getElementById('hdri-sc').value / 100;
            const hOp = document.getElementById('h-op')?.value / 100 || 0.75;
            const sOp = document.getElementById('s-op')?.value / 100 || 0.09;

            // Update Labels
            document.getElementById('v-depth').innerText = depth + "%";
            document.getElementById('v-size').innerText = size + "px";
            document.getElementById('v-angle').innerText = angle + "°";
            document.getElementById('v-altitude').innerText = altitude + "°";
            document.getElementById('v-hdri-sc').innerText = Math.round(hdriSc * 100) + "%";
            document.getElementById('v-hdri-op').innerText = Math.round(hdriOp * 100) + "%";

            // Bevel SVG Update
            const surfaceScale = (depth / 100) * 25;
            document.getElementById('f-light').querySelector('feSpecularLighting').setAttribute('surfaceScale', surfaceScale);
            document.getElementById('f-shadow').querySelector('feDiffuseLighting').setAttribute('surfaceScale', surfaceScale);
            document.getElementById('l-blur').setAttribute('stdDeviation', size / 4);
            document.getElementById('s-blur').setAttribute('stdDeviation', size / 4);
            hDir.setAttribute('azimuth', angle);
            hDir.setAttribute('elevation', altitude);
            sDir.setAttribute('azimuth', angle);
            sDir.setAttribute('elevation', altitude);

            // HDRI Container Update
            const baseSize = 1024 * hdriSc;
            const tiles = document.querySelectorAll('.hdri-tile');
            tiles.forEach((tile, i) => {
                tile.setAttribute('width', baseSize);
                tile.setAttribute('height', baseSize);
                const col = (i % 5) - 2;
                const row = Math.floor(i / 5) - 2;
                tile.setAttribute('x', col * baseSize);
                tile.setAttribute('y', row * baseSize);
            });

            // HDRI Movement (Sensibilitate -15 pentru Tile x5)
            let moveX = currentInput.x * -15; 
            let moveY = currentInput.y * -15;
            let manualX = parseFloat(document.getElementById('hdri-x').value);
            let manualY = parseFloat(document.getElementById('hdri-y').value);

            let finalX = 494 + moveX + manualX;
            let finalY = 1180 + moveY + manualY;

            hdriContainer.setAttribute('transform', `translate(${finalX}, ${finalY})`);
            hdriContainer.style.opacity = hdriOp;
            hdriContainer.style.mixBlendMode = "plus-lighter";

            // Inner/Outer
            const op = (currentStyle === 'inner') ? 'in' : 'out';
            document.getElementById('f-light').querySelector('feComposite').setAttribute('operator', op);
            document.getElementById('f-shadow').querySelector('feComposite').setAttribute('operator', op);
        }

        // DESKTOP: MOUSE CONTROL
        window.addEventListener('mousemove', (e) => {
            if (gyroActive) return; // Prioritate Giroscop dacă e activ
            
            // Transformăm poziția mouse-ului în valori tip Giro (centrul ecranului e 0)
            let gx = (e.clientX / window.innerWidth - 0.5) * 60; // Simulează Gamma
            let gy = (e.clientY / window.innerHeight - 0.5) * 60; // Simulează Beta
            
            processInput(gy, gx);
        });

        // MOBILE: GYRO CONTROL
        function handleOrientation(event) {
            if (!gyroActive) return;
            processInput(event.beta, event.gamma);
        }

        function processInput(beta, gamma) {
            currentInput.x = gamma || 0;
            currentInput.y = beta || 0;

            // Update unghi Bevel
            let angleRad = Math.atan2(currentInput.y, -currentInput.x);
            let angleDeg = (angleRad * (180 / Math.PI) + 360) % 360;
            document.getElementById('angle').value = Math.round(angleDeg);

            if (altitudeDynamic) {
                let tilt = Math.sqrt(currentInput.x**2 + currentInput.y**2);
                document.getElementById('altitude').value = Math.round(Math.max(5, Math.min(85, 90 - tilt)));
            }
            update();
        }

        // UI Events
        document.querySelectorAll('input').forEach(el => el.addEventListener('input', update));
        document.getElementById('style-inner').onclick = (e) => { currentStyle = 'inner'; e.target.classList.add('active'); document.getElementById('style-outer').classList.remove('active'); update(); };
        document.getElementById('style-outer').onclick = (e) => { currentStyle = 'outer'; e.target.classList.add('active'); document.getElementById('style-inner').classList.remove('active'); update(); };
        document.getElementById('toggle-alt-gyro').onclick = (e) => { altitudeDynamic = !altitudeDynamic; e.target.innerText = "Altitude Dynamic: " + (altitudeDynamic ? "ON" : "OFF"); e.target.classList.toggle('active'); };
        
        document.getElementById('activate-sensors').onclick = () => document.getElementById('gyro-overlay').style.display = 'flex';
        document.getElementById('start-gyro-btn').onclick = async () => {
            if (typeof DeviceOrientationEvent?.requestPermission === 'function') {
                const res = await DeviceOrientationEvent.requestPermission();
                if (res === 'granted') {
                    window.addEventListener('deviceorientation', handleOrientation);
                    gyroActive = true;
                }
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                gyroActive = true;
            }
            document.getElementById('gyro-overlay').style.display = 'none';
            document.getElementById('activate-sensors').innerText = "Gyroscope: ON";
        };

        window.onload = update;
    </script>
</body>
</html>
